version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: uvm_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    networks:
      - uvm_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uvm_backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/user_management
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-superrefreshkey_change_in_production}
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
      BCRYPT_ROUNDS: 12
    ports:
      - '5000:5000'
    networks:
      - uvm_network
    command: sh -c "node src/utils/seed.js && node src/server.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api
    container_name: uvm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:80'
    networks:
      - uvm_network

volumes:
  mongo_data:

networks:
  uvm_network:
    driver: bridge
